<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Shea Blog</title>
    <script>
      // GitHub Pages SPA 路由回退：将 404 重定向到首页并带上原始路径
      // 这样前端 React Router 就能正确解析路由
      const path = window.location.pathname.replace('/Shea-Blog', '');
      const segment = path.split('/').filter(Boolean);
      sessionStorage.setItem('redirect', path);
      window.location.replace('/Shea-Blog/');
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
