# Vite + React + pnpm 官方标准 GitHub Pages 部署（终极零报错版）
name: Deploy Vite React to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 配置官方最新兼容Node 24（解决底部Node版本废弃警告）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # 2. 【终极稳定方案】官方原生完整开启corepack + 全局激活pnpm
      - name: Enable Corepack & Install pnpm
        run: |
          sudo corepack enable
          corepack prepare pnpm@latest --activate
          pnpm -v

      # 3. 安装项目依赖
      - name: Install dependencies
        run: pnpm install

      # 4. Vite打包生成dist静态文件
      - name: Build project
        run: pnpm run build

      # 5. 上传打包产物到Pages
      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
