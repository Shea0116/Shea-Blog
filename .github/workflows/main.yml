# Vite + React + pnpm 博客项目 GitHub Pages 全自动部署
name: Deploy Vite React to GitHub Pages

on:
  # 本地main分支push代码时，自动触发部署
  push:
    branches: [ main ]

# 新版GitHub Pages必须配置的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止重复部署冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 云端构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库全部代码
        uses: actions/checkout@v4

      - name: 配置Node环境 + pnpm包管理器
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 安装项目全部依赖
        run: pnpm install

      - name: 执行Vite打包，生成dist静态产物
        run: pnpm run build

      - name: 上传打包好的dist文件夹
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # 正式部署到GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署上线
        id: deployment
        uses: actions/deploy-pages@v4
